spring:
  application:
    name: CharacterChat
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
        default_schema: app
  ai:
    google:
      genai:
        api-key: ${GOOGLE_API_KEY}
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: https://api.groq.com/openai/v1

logging:
  level:
    com.lineyk.characterchat: DEBUG
    org.hibernate.SQL: DEBUG

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000

admin:
  password: ${ADMIN_PASSWORD}