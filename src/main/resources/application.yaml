spring:
  application:
    name: CharacterChat
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
        default_schema: app

logging:
  level:
    com.lineyk.characterchat: DEBUG
    org.hibernate.SQL: DEBUG